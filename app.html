<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Shielded — Insurance Claims Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ─── Shielded design tokens ──────────────────────────────────── */
:root {
  /* Colors — editorial insurance-trust */
  --bg: #f6f3ee;            /* warm off-white */
  --bg-card: #ffffff;
  --bg-subtle: #eeeae2;
  --bg-muted: #e8e3da;
  --ink: #14181f;           /* near black, very slightly cool */
  --ink-2: #2a3140;
  --ink-3: #5b6472;
  --ink-4: #8a93a1;
  --line: #e2ddd3;
  --line-2: #d4cebf;

  --navy: #1a2a4a;          /* deep primary */
  --navy-2: #12203d;
  --navy-soft: #2b3d60;

  --teal: #0f7d6c;          /* positive / covered */
  --teal-soft: #d9ece7;
  --amber: #b8761f;         /* warning */
  --amber-soft: #f5e6c8;
  --red: #a3321c;           /* critical */
  --red-soft: #f1dacf;
  --gold: #b58d3e;

  /* Typography */
  --f-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --f-serif: 'Instrument Serif', 'Cormorant Garamond', 'Iowan Old Style', Georgia, serif;
  --f-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* Scale */
  --r-xs: 4px; --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px;
  --sh-sm: 0 1px 2px rgba(20,24,31,0.04), 0 0 0 1px rgba(20,24,31,0.04);
  --sh-md: 0 2px 8px rgba(20,24,31,0.06), 0 0 0 1px rgba(20,24,31,0.05);
  --sh-lg: 0 8px 32px rgba(20,24,31,0.08), 0 0 0 1px rgba(20,24,31,0.06);
}

[data-theme="dark"] {
  --bg: #0e1218;
  --bg-card: #151b24;
  --bg-subtle: #1a2130;
  --bg-muted: #202838;
  --ink: #f1ece2;
  --ink-2: #d6cfc2;
  --ink-3: #9aa2b0;
  --ink-4: #6b7484;
  --line: #252d3d;
  --line-2: #333c50;
  --navy: #7aa2ff;
  --navy-2: #a8c2ff;
  --navy-soft: #2b3d60;
  --teal: #4ac2ae;
  --teal-soft: #1a2e2b;
  --amber: #e0a957;
  --amber-soft: #302515;
  --red: #d96a50;
  --red-soft: #321a15;
}

.shielded-root, .shielded-root * { box-sizing: border-box; }
.shielded-root {
  font-family: var(--f-sans);
  color: var(--ink);
  background: var(--bg);
  font-feature-settings: 'cv11','ss01','ss03';
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-size: 14px;
  line-height: 1.5;
  height: 100%;
}

/* Typography helpers */
.serif { font-family: var(--f-serif); font-weight: 400; letter-spacing: -0.01em; }
.mono { font-family: var(--f-mono); }
.num-t { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
.eyebrow {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-4);
  font-weight: 500;
}

/* Buttons */
.btn {
  font: inherit;
  font-weight: 500;
  font-size: 13px;
  padding: 8px 14px;
  border-radius: var(--r-md);
  border: 1px solid transparent;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background .12s, border-color .12s, color .12s, transform .04s;
  white-space: nowrap;
}
.btn:active { transform: translateY(0.5px); }
.btn-primary { background: var(--navy); color: #fff; border-color: var(--navy); }
.btn-primary:hover { background: var(--navy-2); }
.btn-ghost { background: transparent; color: var(--ink-2); border-color: var(--line); }
.btn-ghost:hover { background: var(--bg-subtle); }
.btn-quiet { background: transparent; color: var(--ink-2); }
.btn-quiet:hover { background: var(--bg-subtle); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
}

/* Pills / badges */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  line-height: 1;
  border: 1px solid transparent;
}
.pill-teal { background: var(--teal-soft); color: var(--teal); }
.pill-amber { background: var(--amber-soft); color: var(--amber); }
.pill-red { background: var(--red-soft); color: var(--red); }
.pill-neutral { background: var(--bg-subtle); color: var(--ink-3); }
.pill-navy { background: #dde5f2; color: var(--navy); }

.dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

/* Focus states */
.shielded-root input, .shielded-root textarea, .shielded-root select {
  font: inherit;
  color: inherit;
  background: transparent;
  border: 1px solid var(--line-2);
  border-radius: var(--r-md);
  padding: 8px 10px;
  outline: none;
}
.shielded-root input:focus, .shielded-root textarea:focus {
  border-color: var(--navy);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--navy) 15%, transparent);
}

/* Scrollbars kept thin */
.shielded-root ::-webkit-scrollbar { width: 10px; height: 10px; }
.shielded-root ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 99px; border: 2px solid var(--bg); }
.shielded-root ::-webkit-scrollbar-track { background: transparent; }

/* Divider */
.hr { height: 1px; background: var(--line); border: none; margin: 0; }

/* Subtle placeholder stripe for imagery */
.placeholder {
  background:
    repeating-linear-gradient(45deg, var(--bg-muted) 0 8px, var(--bg-subtle) 8px 16px);
  color: var(--ink-4);
  font-family: var(--f-mono);
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--r-md);
  border: 1px dashed var(--line-2);
}

/* Keyboard key */
.kbd {
  font-family: var(--f-mono);
  font-size: 11px;
  padding: 1px 6px;
  border: 1px solid var(--line-2);
  border-bottom-width: 2px;
  border-radius: 4px;
  background: var(--bg-card);
  color: var(--ink-3);
}

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.fade-in { animation: fadeIn .3s ease both; }

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.pulse { animation: pulse-dot 1.8s ease-in-out infinite; }

@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.shimmer {
  background: linear-gradient(90deg, var(--bg-muted) 0%, var(--bg-subtle) 50%, var(--bg-muted) 100%);
  background-size: 800px 100%;
  animation: shimmer 1.6s linear infinite;
}

/* Typewriter cursor */
.caret::after {
  content: '▊';
  color: var(--navy);
  margin-left: 2px;
  animation: blink 1.1s steps(1) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

</style>
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: #ebe6dd; }

  /* ── Mobile base ─────────────────────────────── */
  @media (max-width: 767px) {
    html, body { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    input, textarea, select { font-size: 16px !important; } /* prevent iOS zoom */
    .shielded-root { font-size: 13px; }

    /* Collapse multi-col grids */
    .m-col-1 { grid-template-columns: 1fr !important; }
    .m-col-2 { grid-template-columns: 1fr 1fr !important; }

    /* Tighten padding on mobile */
    .m-pad { padding: 14px 16px !important; }
    .m-pad-sm { padding: 10px 12px !important; }

    /* Hide desktop-only elements */
    .m-hide { display: none !important; }

    /* Mobile card spacing */
    .m-gap-sm { gap: 10px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
// Global mobile hook — defined before Babel scripts so all components can access it
function useMobile() {
  var [mobile, setMobile] = React.useState(window.innerWidth < 768);
  React.useEffect(function() {
    var handler = function() { setMobile(window.innerWidth < 768); };
    window.addEventListener('resize', handler);
    return function() { window.removeEventListener('resize', handler); };
  }, []);
  return mobile;
}
</script>

<script type="text/babel">

// DesignCanvas.jsx — Figma-ish design canvas wrapper
// Warm gray grid bg + Sections + Artboards + PostIt notes.
// Artboards are reorderable (grip-drag), labels/titles are inline-editable,
// and any artboard can be opened in a fullscreen focus overlay (←/→/Esc).
// State persists to a .design-canvas.state.json sidecar via the host
// bridge. No assets, no deps.
//
// Usage:
//   <DesignCanvas>
//     <DCSection id="onboarding" title="Onboarding" subtitle="First-run variants">
//       <DCArtboard id="a" label="A · Dusk" width={260} height={480}>…</DCArtboard>
//       <DCArtboard id="b" label="B · Minimal" width={260} height={480}>…</DCArtboard>
//     </DCSection>
//   </DesignCanvas>

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

// One-time CSS injection (classes are dc-prefixed so they don't collide with
// the hosted design's own styles).
if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
    '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

// ─────────────────────────────────────────────────────────────
// DesignCanvas — stateful wrapper around the pan/zoom viewport.
// Owns runtime state (per-section order, renamed titles/labels, focused
// artboard). Order/titles/labels persist to a .design-canvas.state.json
// sidecar next to the HTML. Reads go via plain fetch() so the saved
// arrangement is visible anywhere the HTML + sidecar are served together
// (omelette preview, direct link, downloaded zip). Writes go through the
// host's window.omelette bridge — editing requires the omelette runtime.
// Focus is ephemeral.
// ─────────────────────────────────────────────────────────────
const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  // Hold rendering until the sidecar read settles so the saved order/titles
  // appear on first paint (no source-order flash). didRead gates writes until
  // the read settles so the empty initial state can't clobber a slow read;
  // skipNextWrite suppresses the one echo-write that would otherwise follow
  // hydration.
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  // Build registries synchronously from children so FocusOverlay can read
  // them in the same render. Only direct DCSection > DCArtboard children are
  // walked — wrapping them in other elements opts out of focus/reorder.
  const registry = {};     // slotId -> { sectionId, artboard }
  const sectionMeta = {};  // sectionId -> { title, subtitle, slotIds[] }
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  // Expose setFocus globally so sidebar nav can drive prototype navigation.
  const setFocusRef = React.useRef(null);
  setFocusRef.current = api.setFocus;
  React.useEffect(() => {
    window.__dcSetFocus = (...args) => setFocusRef.current?.(...args);
    return () => { delete window.__dcSetFocus; };
  }, []);

  // Esc exits focus; any outside pointerdown commits an in-progress rename.
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

// ─────────────────────────────────────────────────────────────
// DCViewport — transform-based pan/zoom (internal)
//
// Input mapping (Figma-style):
//   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
//   • trackpad scroll → pan    (two-finger)
//   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
//   • middle-drag / primary-drag-on-bg → pan
//
// Transform state lives in a ref and is written straight to the DOM
// (translate3d + will-change) so wheel ticks don't go through React —
// keeps pans at 60fps on dense canvases.
// ─────────────────────────────────────────────────────────────
function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      // keep the world point under the cursor fixed
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
    // line-mode deltas (Firefox) or large integer pixel deltas with no X
    // component (Chrome/Safari, typically multiples of 100/120). Trackpad
    // two-finger scroll sends small/fractional pixel deltas, often with
    // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
      if (e.ctrlKey) {
        // trackpad pinch (or explicit ctrl+wheel)
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        // notched mouse wheel — fixed-ratio step per click
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        // trackpad two-finger scroll — pan
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    // Safari sends native gesture* events for trackpad pinch with a smooth
    // e.scale; preferring these over the ctrl+wheel fallback gives a much
    // better feel there. No-ops on other browsers. Safari also fires
    // ctrlKey wheel events during the same pinch — isGesturing makes
    // onWheel drop those entirely so they neither zoom nor pan.
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    // Drag-pan: middle button anywhere, or primary button on canvas
    // background (anything that isn't an artboard or an inline editor).
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div
      ref={vpRef}
      className="design-canvas"
      style={{
        height: '100vh', width: '100vw',
        background: DC.bg,
        overflow: 'hidden',
        overscrollBehavior: 'none',
        touchAction: 'none',
        position: 'relative',
        fontFamily: DC.font,
        boxSizing: 'border-box',
        ...style,
      }}
    >
      <div
        ref={worldRef}
        style={{
          position: 'absolute', top: 0, left: 0,
          transformOrigin: '0 0',
          willChange: 'transform',
          width: 'max-content', minWidth: '100%',
          minHeight: '100%',
          padding: '60px 0 80px',
        }}
      >
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DCSection — editable title + h-row of artboards in persisted order
// ─────────────────────────────────────────────────────────────
function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
  const sec = (ctx && sid && ctx.section(sid)) || {};

  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);

  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

  return (
    <div data-dc-section={sid} style={{ marginBottom: 80, position: 'relative' }}>
      <div style={{ padding: '0 60px 56px' }}>
        <DCEditable tag="div" value={sec.title ?? title}
          onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
          style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
        {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

// DCArtboard — marker; rendered by DCArtboardFrame via DCSection.
function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);

  // Live drag-reorder: dragged card sticks to cursor; siblings slide into
  // their would-be slots in real time via transforms. DOM order only
  // changes on drop.
  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    // translateX is applied in local (pre-scale) space but pointer deltas and
    // getBoundingClientRect().left are screen-space — divide by the viewport's
    // current scale so the dragged card tracks the cursor at any zoom level.
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');

    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };

    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };

    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      // After the settle transition, kill transitions + clear transforms +
      // commit the reorder in the same frame so there's no visual snap-back.
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: -4, marginBottom: 4, color: DC.label }}>
        <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
          <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
        </div>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
            style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} onPointerDown={(e) => e.stopPropagation()} title="Focus">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
      </button>
      <div className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb', fontSize: 13, fontFamily: DC.font }}>{id}</div>}
      </div>
    </div>
  );
}

// Inline rename — commits on blur or Enter.
function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
  const T = tag;
  return (
    <T className="dc-editable" contentEditable suppressContentEditableWarning
      onClick={onClick}
      onPointerDown={(e) => e.stopPropagation()}
      onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
      style={style}>{value}</T>
  );
}

// ─────────────────────────────────────────────────────────────
// Focus mode — overlay one artboard; ←/→ within section, ↑/↓ across
// sections, Esc or backdrop click to exit.
// ─────────────────────────────────────────────────────────────
function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);

  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
    const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
    if (first) ctx.setFocus(`${ns}/${first}`);
  };

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });

  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, fontSize: 18, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );

  // Portal to body so position:fixed is the real viewport regardless of any
  // transform on DesignCanvas's ancestors (including the canvas zoom itself).
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>

      {/* top bar: section dropdown (left) · close (right) */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}
            style={{ border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', padding: '6px 8px',
              borderRadius: 6, textAlign: 'left', fontFamily: 'inherit' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>{meta.title}</span>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>
            {meta.subtitle && <span style={{ display: 'block', fontSize: 13, opacity: .6, fontWeight: 400, marginTop: 2 }}>{meta.subtitle}</span>}
          </button>
          {ddOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, background: '#2a251f', borderRadius: 8,
              boxShadow: '0 8px 32px rgba(0,0,0,.4)', padding: 4, minWidth: 200, zIndex: 10 }}>
              {sectionOrder.map((sid) => (
                <button key={sid} onClick={() => { setDd(false); const f = sectionMeta[sid].slotIds[0]; if (f) ctx.setFocus(`${sid}/${f}`); }}
                  style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                    background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent', color: '#fff',
                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => ctx.setFocus(null)}
          onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
          onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
          style={{ border: 'none', background: 'transparent', color: 'rgba(255,255,255,.7)', width: 32, height: 32,
            borderRadius: 16, fontSize: 20, cursor: 'pointer', lineHeight: 1, transition: 'background .12s' }}>×</button>
      </div>

      {/* card centered, label + index below — only the card itself stops
          propagation so any backdrop click (including the margins around
          the card) exits focus */}
      <div
        style={{ position: 'absolute', top: 64, bottom: 56, left: 100, right: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: width * scale, height: height * scale, position: 'relative' }}>
          <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'top left', background: '#fff', borderRadius: 2, overflow: 'hidden',
            boxShadow: '0 20px 80px rgba(0,0,0,.4)' }}>
            {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb' }}>{aid}</div>}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize: 14, fontWeight: 500, opacity: .85, textAlign: 'center' }}>
          {(sec.labels || {})[aid] ?? artboard.props.label}
          <span style={{ opacity: .5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{idx + 1} / {peers.length}</span>
        </div>
      </div>

      <Arrow dir="left" onClick={() => go(-1)} />
      <Arrow dir="right" onClick={() => go(1)} />

      {/* dots */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => ctx.setFocus(`${sectionId}/${p}`)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}

// ─────────────────────────────────────────────────────────────
// Post-it — absolute-positioned sticky note
// ─────────────────────────────────────────────────────────────
function DCPostIt({ children, top, left, right, bottom, rotate = -2, width = 180 }) {
  return (
    <div style={{
      position: 'absolute', top, left, right, bottom, width,
      background: DC.postitBg, padding: '14px 16px',
      fontFamily: '"Comic Sans MS", "Marker Felt", "Segoe Print", cursive',
      fontSize: 14, lineHeight: 1.4, color: DC.postitText,
      boxShadow: '0 2px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08)',
      transform: `rotate(${rotate}deg)`,
      zIndex: 5,
    }}>{children}</div>
  );
}

Object.assign(window, { DesignCanvas, DCSection, DCArtboard, DCPostIt });


</script>

<script type="text/babel">
// AIAssistant.jsx — conversational panel (confident advocate tone)

const AI_SEED = [
  { who: 'ai', text: `I've reviewed GreatWest's ${(28400).toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 })} offer against 7 similar NC restaurant fire claims. Their offer is **41% below** the fair-settlement midpoint.`, refs: ['Policy §4.2', '7 comps'] },
  { who: 'ai', text: 'Three specific clauses support a higher payout. Want me to draft the rebuttal?', chips: ['Draft rebuttal email', 'Show the 3 clauses', 'Why so low?'] },
];

function AIBubble({ m }) {
  const isAI = m.who === 'ai';
  const rendered = (m.text || '').split(/(\*\*[^*]+\*\*)/g).map((p, i) =>
    p.startsWith('**') ? <strong key={i} style={{ color: 'var(--ink)', fontWeight: 600 }}>{p.slice(2, -2)}</strong> : <React.Fragment key={i}>{p}</React.Fragment>
  );
  return (
    <div style={{
      display: 'flex', gap: 8, flexDirection: isAI ? 'row' : 'row-reverse', alignItems: 'flex-start',
    }}>
      {isAI && (
        <div style={{
          width: 22, height: 22, borderRadius: 6, background: 'var(--navy)',
          color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', flex: 'none', marginTop: 2,
        }}>
          <ShieldedMark size={13} color="#fff" />
        </div>
      )}
      <div style={{ maxWidth: '85%', display: 'flex', flexDirection: 'column', gap: 8, alignItems: isAI ? 'flex-start' : 'flex-end' }}>
        <div style={{
          padding: '9px 12px',
          borderRadius: isAI ? '4px 12px 12px 12px' : '12px 4px 12px 12px',
          background: isAI ? 'var(--bg-card)' : 'var(--navy)',
          color: isAI ? 'var(--ink-2)' : '#fff',
          border: isAI ? '1px solid var(--line)' : 'none',
          fontSize: 13, lineHeight: 1.5,
        }}>
          {rendered}
          {m.refs && (
            <div style={{ display: 'flex', gap: 6, marginTop: 8, flexWrap: 'wrap' }}>
              {m.refs.map(r => (
                <span key={r} className="mono" style={{
                  fontSize: 10, padding: '1px 6px', borderRadius: 4,
                  background: 'var(--bg-subtle)', color: 'var(--ink-3)', border: '1px solid var(--line)',
                }}>{r}</span>
              ))}
            </div>
          )}
        </div>
        {m.chips && (
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {m.chips.map(c => (
              <button key={c} className="btn btn-ghost btn-sm" style={{ fontSize: 11.5, padding: '4px 10px', borderRadius: 99 }}>
                {c}
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function AIAssistant({ onClose, docked = true }) {
  const [messages, setMessages] = React.useState(AI_SEED);
  const [input, setInput] = React.useState('');
  const [thinking, setThinking] = React.useState(false);
  const scroll = React.useRef(null);

  React.useEffect(() => {
    if (scroll.current) scroll.current.scrollTop = scroll.current.scrollHeight;
  }, [messages, thinking]);

  const send = (text) => {
    if (!text.trim()) return;
    setMessages(m => [...m, { who: 'you', text }]);
    setInput('');
    setThinking(true);
    setTimeout(() => {
      setThinking(false);
      setMessages(m => [...m, {
        who: 'ai',
        text: "Here's what I'd lean on: your policy §4.2 guarantees **replacement cost** on kitchen equipment — GreatWest valued the hood and oven at actual-cash-value, which is a $9,200 gap on its own. I'll build the rebuttal.",
        refs: ['Policy §4.2', 'Adjuster p.3'],
        chips: ['Draft the email', 'Show the math'],
      }]);
    }, 1100);
  };

  return (
    <div style={{
      width: docked ? 360 : '100%',
      background: 'var(--bg)',
      borderLeft: docked ? '1px solid var(--line)' : 'none',
      display: 'flex', flexDirection: 'column', flex: 'none',
    }}>

        padding: '12px 16px', borderBottom: '1px solid var(--line)',
        display: 'flex', alignItems: 'center', gap: 10,

          width: 26, height: 26, borderRadius: 7, background: 'var(--navy)', color: '#fff',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <ShieldedMark size={15} color="#fff"/>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 6 }}>
            Shielded <span className="pill pill-teal" style={{ padding: '2px 7px', fontSize: 10 }}>
              <span className="dot pulse" style={{ background: 'var(--teal)' }}/> online
            </span>
          </div>
          <div style={{ fontSize: 11, color: 'var(--ink-4)' }}>Your claim advocate · cites policy + benchmarks</div>
        </div>
        {onClose && <button className="btn btn-quiet btn-sm" onClick={onClose} style={{ padding: 6 }}><Icons.X size={14}/></button>}
      </div>

      <div ref={scroll} style={{
        flex: 1, overflow: 'auto', padding: '16px', display: 'flex', flexDirection: 'column', gap: 12,
      }}>
        <div className="eyebrow" style={{ textAlign: 'center', marginBottom: 4 }}>
          Claim CLM-2041 · Fire & Smoke
        </div>
        {messages.map((m, i) => <AIBubble key={i} m={m} />)}
        {thinking && (
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <div style={{
              width: 22, height: 22, borderRadius: 6, background: 'var(--navy)',
              color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <ShieldedMark size={13} color="#fff"/>
            </div>
            <div style={{ padding: '9px 12px', background: 'var(--bg-card)', border: '1px solid var(--line)', borderRadius: 12, display: 'flex', gap: 4 }}>
              {[0, 1, 2].map(i => (
                <span key={i} style={{
                  width: 5, height: 5, borderRadius: 99, background: 'var(--ink-4)',
                  animation: `pulse-dot 1.2s ease-in-out ${i * 0.15}s infinite`,
                }}/>
              ))}
            </div>
          </div>
        )}
      </div>

      <div style={{ padding: 12, borderTop: '1px solid var(--line)' }}>
        <div style={{
          display: 'flex', gap: 8, alignItems: 'flex-end',
          background: 'var(--bg-card)', border: '1px solid var(--line)', borderRadius: 12, padding: 8,
        }}>
          <textarea
            rows={1}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input); } }}
            placeholder="Ask about your claim, policy, or negotiation…"
            style={{
              flex: 1, resize: 'none', border: 'none', padding: '4px 4px', background: 'transparent',
              fontSize: 13, maxHeight: 100, outline: 'none', boxShadow: 'none',

          <button className="btn btn-primary btn-sm" onClick={() => send(input)} style={{ padding: '6px 10px', opacity: input.trim() ? 1 : 0.45 }}>
            <Icons.ArrowUp size={14}/>
          </button>

                <div key={i} onClick={() => setSelectedIdx(i)} style={{
                  padding: '11px 16px',

                      }}>{d.name}</div>
                      {d.claim && (
                        <div className="mono" style={{ fontSize: 10, color: 'var(--ink-4)' }}>{d.claim}</div>
                      )}

                  </div>

                  {/* Kind */}
                  <span className={`pill pill-${KIND_COLOR[d.kind]}`} style={{ fontSize: 10.5 }}>{d.kind}</span>

                  {/* Size */}
                  <span className="mono" style={{ fontSize: 11.5, color: 'var(--ink-3)', textAlign: 'right' }}>{d.size}</span>

                  {/* Date */}
                  <span className="mono" style={{ fontSize: 11.5, color: 'var(--ink-4)', textAlign: 'right' }}>{d.date}</span>

                  {/* Status */}
                  {d.status === 'verified'

                    : <span className="pill pill-amber" style={{ fontSize: 10.5 }}><Icons.Clock size={9}/> Pending</span>}

                  {/* Actions */}
                  <button className="btn btn-quiet btn-sm" style={{ padding: 4, justifyContent: 'center' }}
                    onClick={e => e.stopPropagation()}>
                    <Icons.Dots size={13}/>
                  </button>
                </div>
              );
            })}
          </div>

          {/* Upload CTA */}
          <div style={{
            marginTop: 14, padding: '18px 24px',
            border: '1.5px dashed var(--line-2)', borderRadius: 10,
            background: 'var(--bg-subtle)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 14,
            cursor: 'pointer',
          }}>
            <Icons.Upload size={16} style={{ color: 'var(--ink-4)' }}/>
            <div style={{ fontSize: 13, color: 'var(--ink-3)' }}>
              Drop files here or <span style={{ color: 'var(--navy)', fontWeight: 500, cursor: 'pointer' }}>click to upload</span>
              <span className="mono" style={{ fontSize: 11, marginLeft: 8, color: 'var(--ink-4)' }}>PDF · DOCX · XLSX · ZIP · JPG · up to 250 MB</span>
            </div>
          </div>
        </div>
      </div>

      {/* Right: detail panel */}
      <DocDetail doc={selected}/>
    </div>
  );
}

Object.assign(window, { Documents });

</script>

const STATUS_KIND = { Negotiating: 'amber', Settled: 'teal', Closed: 'neutral', 'In review': 'navy' };

function GapBar({ offer, fairMid, fairLow, fairHigh, settled }) {
  const min = 0, max = 60000;
  const pct = v => Math.min(100, Math.max(0, ((v - min) / (max - min)) * 100));
  const lo = pct(fairLow || fairMid * 0.85);
  const hi = pct(fairHigh || fairMid * 1.15);
  const offerPct = pct(offer);
  const settledPct = settled ? pct(settled) : null;
  return (
    <div style={{ position: 'relative', height: 20, width: 160, flex: 'none' }}>
      <div style={{ position: 'absolute', left: 0, right: 0, top: 8, height: 4, background: 'var(--line)', borderRadius: 99 }}/>
      <div style={{ position: 'absolute', left: lo + '%', width: (hi - lo) + '%', top: 8, height: 4, background: 'var(--teal-soft)', border: '1px solid var(--teal)', borderRadius: 99 }}/>
      <div style={{ position: 'absolute', left: offerPct + '%', top: 2, width: 2, height: 16, background: settled ? 'var(--ink-4)' : 'var(--red)', borderRadius: 1 }}/>
      {settledPct && (
        <div style={{ position: 'absolute', left: settledPct + '%', top: 2, width: 2, height: 16, background: 'var(--teal)', borderRadius: 1 }}/>
      )}
    </div>
  );
}

function ClaimRow({ c, on, onClick, isMobile }) {

      <div style={{ textAlign: 'right' }}>
        {c.gap > 0 ? <span className="pill pill-red" style={{ fontSize: 11 }}>+{fmt(c.gap)}</span>
          : c.settled ? <span className="pill pill-teal" style={{ fontSize: 11 }}>+{fmt(c.settled - c.offer)}</span>

}

<script type="text/babel">

const MONTHLY_DATA = [
  { month: 'Oct', claims: 0, recovered: 0,    offered: 0 },
  { month: 'Nov', claims: 0, recovered: 0,    offered: 0 },
  { month: 'Dec', claims: 1, recovered: 0,    offered: 4400,  settled: 4400 },
  { month: 'Jan', claims: 0, recovered: 0,    offered: 0 },
  { month: 'Feb', claims: 0, recovered: 0,    offered: 0 },
  { month: 'Mar', claims: 1, recovered: 0,    offered: 12800, settled: 15200 },
  { month: 'Apr', claims: 1, recovered: 19400,offered: 28400 },
];

const CLAIM_TYPES = [
  { label: 'Fire & smoke',  count: 1, pct: 33, color: 'var(--red)' },
  { label: 'Water damage',  count: 1, pct: 33, color: 'var(--navy)' },
  { label: 'Theft',         count: 1, pct: 33, color: 'var(--amber)' },
];

// SVG bar chart
function BarChart({ data, height = 140 }) {
  const maxVal = Math.max(...data.map(d => Math.max(d.offered || 0, d.settled || 0, d.recovered || 0)));
  const w = 52, gap = 8, padL = 40;

  return (
    <svg width="100%" height={height + 40} viewBox={`0 0 ${(w + gap) * data.length + padL} ${height + 40}`} style={{ overflow: 'visible' }}>
      {/* Y axis gridlines */}
      {[0, 0.25, 0.5, 0.75, 1].map((tick, i) => {
        const y = height - tick * height;
        const val = Math.round(tick * maxVal / 1000);
        return (
          <g key={i}>
            <line x1={padL} x2={(w + gap) * data.length + padL} y1={y} y2={y} stroke="var(--line)" strokeWidth="1" strokeDasharray={tick > 0 ? "3,3" : "0"}/>
            {tick > 0 && <text x={padL - 6} y={y + 4} textAnchor="end" fontSize="9" fill="var(--ink-4)" fontFamily="monospace">${val}k</text>}
          </g>
        );
      })}

      {data.map((d, i) => {
        const x = padL + i * (w + gap);
        const oh = maxVal > 0 ? (d.offered || 0) / maxVal * height : 0;
        const sh = maxVal > 0 ? (d.settled || 0) / maxVal * height : 0;
        const rh = maxVal > 0 ? (d.recovered || 0) / maxVal * height : 0;

        return (
          <g key={d.month}>
            {/* Offer bar */}
            {oh > 0 && <rect x={x} y={height - oh} width={w * 0.35} height={oh} fill="var(--red)" opacity="0.3" rx="2"/>}
            {/* Settled bar */}
            {sh > 0 && <rect x={x + w * 0.38} y={height - sh} width={w * 0.35} height={sh} fill="var(--teal)" opacity="0.7" rx="2"/>}
            {/* Recovery gap indicator */}
            {rh > 0 && (
              <>
                <rect x={x} y={height - oh} width={w * 0.35} height={oh} fill="var(--red)" opacity="0.15" rx="2"/>
                <rect x={x} y={height - oh - rh} width={w * 0.35} height={rh} fill="var(--teal)" opacity="0.5" rx="2"/>
              </>
            )}
            {/* Month label */}
            <text x={x + w / 2} y={height + 16} textAnchor="middle" fontSize="10" fill="var(--ink-4)" fontFamily="monospace">{d.month}</text>
            {/* Claim dot */}
            {d.claims > 0 && <circle cx={x + w / 2} cy={height + 28} r="3" fill={d.recovered > 0 ? 'var(--amber)' : d.settled ? 'var(--teal)' : 'var(--ink-4)'}/>}
          </g>
        );
      })}
    </svg>
  );
}

// Donut chart
function DonutChart({ segments, size = 100 }) {
  const r = 36, cx = size / 2, cy = size / 2;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--line)" strokeWidth="12"/>
      {segments.map((s, i) => {
        const dash = (s.pct / 100) * circ;
        const el = (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none"
            stroke={s.color} strokeWidth="12"
            strokeDasharray={`${dash} ${circ}`}
            strokeDashoffset={-offset}
            strokeLinecap="butt"/>
        );
        offset += dash;
        return el;
      })}
    </svg>
  );
}

// Mini sparkline
function Sparkline({ values, color = 'var(--teal)', width = 80, height = 28 }) {
  const max = Math.max(...values, 1);
  const pts = values.map((v, i) => `${(i / (values.length - 1)) * width},${height - (v / max) * height}`).join(' ');
  return (
    <svg width={width} height={height} style={{ overflow: 'visible' }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={(values.length - 1) / (values.length - 1) * width} cy={height - (values[values.length - 1] / max) * height} r="2.5" fill={color}/>
    </svg>
  );
}

        <div>

          <div style={{ fontSize: 13, color: 'var(--ink-3)', marginTop: 4 }}>Lumen & Loaf · All claims and policies</div>
        </div>
        <div style={{ display: 'flex', gap: 6 }}>

      </div>

      {/* KPI strip */}

function useRoute() {
  const get = () => (window.location.hash || '#/').replace(/^#/, '') || '/';
  const [path, setPath] = React.useState(get);
  React.useEffect(() => {
    const handler = () => setPath(get());
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  return path;
}

  root.style.setProperty('--navy', `oklch(0.32 0.10 ${hue})`);
  root.style.setProperty('--navy-2', `oklch(0.38 0.11 ${hue})`);
  root.style.setProperty('--navy-soft', `oklch(0.48 0.08 ${hue})`);
  if (t.density === 'compact') {
    root.style.setProperty('--r-lg', '8px');
    root.style.setProperty('--r-xl', '12px');
    document.body.style.fontSize = '13px';

        <div style={{
          position:'fixed', bottom:0, left:0, right:0,
          background:'var(--bg)', borderTop:'1px solid var(--line)',
          display:'flex', zIndex:100,
          paddingBottom:'env(safe-area-inset-bottom)',
        }}>
          {MOBILE_NAV.map(n => {
            const I = Icons[n.icon];
            const on = n.id === active;
            return (
              <button key={n.id} onClick={() => dcNav(n.id)} style={{
                flex:1, border:'none', background:'none',
                padding:'8px 4px 6px', display:'flex', flexDirection:'column',
                alignItems:'center', gap:3, cursor:'pointer',
                color: on ? 'var(--navy)' : 'var(--ink-4)',
              }}>
                <I size={20} stroke={on ? 2 : 1.5}/>
                <span style={{ fontSize:9, fontWeight: on ? 600 : 400, fontFamily:'var(--f-sans)', letterSpacing:0.2 }}>{n.label}</span>
              </button>
            );
          })}
          <button onClick={() => window.navigate?.('/app/settings')} style={{
            flex:1, border:'none', background:'none',
            padding:'8px 4px 6px', display:'flex', flexDirection:'column',
            alignItems:'center', gap:3, cursor:'pointer',
            color: active === 'settings' ? 'var(--navy)' : 'var(--ink-4)',
          }}>
            <Icons.Settings size={20} stroke={active === 'settings' ? 2 : 1.5}/>
            <span style={{ fontSize:9, fontFamily:'var(--f-sans)', fontWeight: active === 'settings' ? 600 : 400 }}>More</span>
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="shielded-root" style={{ display:'flex', height:'100%', background:'var(--bg)' }}>
      <Sidebar active={active} compact={false} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0, overflow:'hidden' }}>
        <TopBar title={title} subtitle={subtitle} crumbs={crumbs} right={right}/>
        <div style={{ flex:1, overflow:'auto' }}>{children}</div>
      </div>
      {showAI && aiOpen && <AIAssistant onClose={() => setAiOpen(false)}/>}
    </div>
  );
}

// ─── Page (full-screen wrapper) ───────────────────────────────────
function Page({ ch }) {
  return <div className="shielded-root" style={{ height:'100%' }}>{ch}</div>;
}

// ─── App ─────────────────────────────────────────────────────────
function App() {
  const route = useRoute();

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target.matches('input,textarea,[contenteditable]')) return;
      if (e.key === 'd' || e.key === 'D') {
        APP_TWEAKS.theme = APP_TWEAKS.theme === 'dark' ? 'light' : 'dark';
        applyTheme(APP_TWEAKS);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  if (!route || route === '/')   return <Page ch={<Landing />}/>;
  if (route === '/signin')       return <Page ch={<SignIn />}/>;
  if (route === '/signup')       return <Page ch={<SignUp />}/>;
  if (route === '/forgot-pw')    return <Page ch={<ForgotPassword />}/>;
  if (route === '/onboard' || route === '/onboard/1') return <Page ch={<OnboardingUpload />}/>;
  if (route === '/onboard/2')    return <Page ch={<OnboardingReview />}/>;
  if (route === '/onboard/3')    return <Page ch={<OnboardingDone />}/>;

  if (route === '/app/dashboard') return (
    <AppFrame active="dashboard" title="Overview" subtitle="Lumen & Loaf · Commercial Property" crumbs={['Home']}>
      <Dashboard variant="B"/>
    </AppFrame>
  );
  if (route === '/app/claims') return (
    <AppFrame active="claims" title="Claims" subtitle="1 active" crumbs={['Claims']} showAI={false}>
      <ClaimsList />
    </AppFrame>
  );
  if (route === '/app/policies') return (
    <AppFrame active="policy" title="Policies" subtitle="2 active" crumbs={['Policies']} showAI={false}>
      <PoliciesList />
    </AppFrame>
  );
  if (route === '/app/documents') return (
    <AppFrame active="documents" title="Documents" subtitle="12 files" crumbs={['Documents']} showAI={false}>
      <Documents />
    </AppFrame>
  );
  if (route === '/app/negotiate') return (
    <AppFrame active="negotiate" title="Negotiation generator" crumbs={['Claims','CLM-2041','Negotiate']}>
      <Negotiate />
    </AppFrame>
  );
  if (route === '/app/benchmark') return (
    <AppFrame active="benchmark" title="Settlement benchmarking" crumbs={['Claims','CLM-2041','Benchmark']}>
      <Benchmark />
    </AppFrame>
  );
  if (route === '/app/deadlines') return (
    <AppFrame active="deadlines" title="Deadlines" crumbs={['Deadlines']} showAI={false}>
      <Timeline />
    </AppFrame>
  );
  if (route === '/app/settings') return (
    <AppFrame active="settings" title="Settings" crumbs={['Settings']} showAI={false}>
      <Settings />
    </AppFrame>
  );
  if (route === '/app/analytics') return (
    <AppFrame active="dashboard" title="Analytics" subtitle="All claims · Lumen & Loaf" crumbs={['Analytics']} showAI={false}>
      <Analytics />
    </AppFrame>
  );
  if (route === '/app/search') return (
    <AppFrame active="dashboard" title="Search" crumbs={['Search']} showAI={false}>
      <GlobalSearch />
    </AppFrame>
  );
  if (route === '/app/notifications') return (
    <AppFrame active="dashboard" title="Notifications" crumbs={['Notifications']} showAI={false}>
      <NotificationCenter />
    </AppFrame>
  );
  if (route === '/app/public-status') return <Page ch={<PublicStatus />}/>;
  if (route === '/app/doc-viewer') return (
    <AppFrame active="documents" title="Document viewer" crumbs={['Documents','Viewer']} showAI={false}>
      <DocumentViewer />
    </AppFrame>
  );
  if (route === '/app/policy-renewal') return (
    <AppFrame active="policy" title="Policy renewal" crumbs={['Policies','Renewal']} showAI={false}>
      <PolicyRenewal />
    </AppFrame>
  );
  if (route === '/app/correspondence') return (
    <AppFrame active="claims" title="Correspondence" crumbs={['Claims','CLM-2041','Correspondence']} showAI={false}>
      <Correspondence />
    </AppFrame>
  );
  if (route === '/app/email-templates') return (
    <AppFrame active="dashboard" title="Email templates" crumbs={['Email Templates']} showAI={false}>
      <div style={{ padding: 28, display: 'flex', flexDirection: 'column', gap: 32, overflow: 'auto' }}>
        <EmailDeadlineAlert />
        <EmailSettlementOffer />
        <EmailWeeklyDigest />
      </div>
    </AppFrame>
  );
  if (route === '/app/policy-compare') return (
    <AppFrame active="policy" title="Policy comparison" crumbs={['Policies','Compare']} showAI={false}>
      <PolicyComparison />
    </AppFrame>
  );
  if (route === '/app/upgrade') return <Page ch={<UpgradePage />}/>;
  if (route === '/app/claim-stories') return (
    <AppFrame active="dashboard" title="Claim stories" crumbs={['Stories']} showAI={false}>
      <ClaimStories />
    </AppFrame>
  );
  if (route === '/app/claim-report') return (
    <AppFrame active="claims" title="Claim report · CLM-2041" crumbs={['Claims','CLM-2041','Report']} showAI={false}>
      <ClaimReport />
    </AppFrame>
  );
  if (route === '/app/policy-analysis') return (
    <AppFrame active="policy" title="Policy analysis" crumbs={['Policies','CPP-48291-B']}>
      <PolicyAnalysis />
    </AppFrame>
  );
  if (route === '/app/policy-upload') return (
    <AppFrame active="policy" title="Upload policy" crumbs={['Policies','Upload']} showAI={false}>
      <PolicyUpload />
    </AppFrame>
  );
  if (route === '/broker') return <Page ch={<BrokerLanding />}/>;
  if (route === '/broker/dashboard') return (
    <div className="shielded-root" style={{ height:'100%' }}>
      <BrokerDashboard />
    </div>
  );
  if (route === '/claim-flow/start')        return <Page ch={<ClaimStart />}/>;
  if (route === '/claim-flow/create')       return <Page ch={<ClaimCreate />}/>;
  if (route === '/claim-flow/docs')         return <Page ch={<ClaimDocs />}/>;
  if (route === '/claim-flow/file')         return <Page ch={<ClaimFile />}/>;
  if (route === '/claim-flow/first-report') return <Page ch={<ClaimFirstReport />}/>;
  if (route === '/claim-flow/settled')      return <Page ch={<ClaimSettled />}/>;
  if (route === '/mobile') return <Page ch={<MobileDashboard />}/>;
  if (route === '/not-found') return <Page ch={<NotFound />}/>;
  if (route === '/error')     return <Page ch={<AppError />}/>;
  if (route === '/offline')   return <Page ch={<OfflineState />}/>;

  window.navigate('/');
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
