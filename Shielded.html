// ─── Tweaks: theme, accent, AI tone, density ──────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "compact",
  "primaryHue": 264,
  "dashboardHero": "B"
}/*EDITMODE-END*/;

function applyTweaks(t) {
  const root = document.documentElement;
  root.setAttribute('data-theme', t.theme);
  // Recompute navy from hue (lightness + chroma fixed to stay on-brand)
  const h = t.primaryHue;
  root.style.setProperty('--navy', `oklch(0.32 0.10 ${h})`);
  root.style.setProperty('--navy-2', `oklch(0.38 0.11 ${h})`);
  root.style.setProperty('--navy-soft', `oklch(0.48 0.08 ${h})`);
  if (t.density === 'compact') {
    root.style.setProperty('--r-lg', '8px');
    root.style.setProperty('--r-xl', '12px');
    document.body.style.fontSize = '13px';
  } else {
    root.style.setProperty('--r-lg', '12px');
    root.style.setProperty('--r-xl', '16px');
    document.body.style.fontSize = '14px';
  }
}

// ─── AppFrame: chrome used by all app screens ─────────────────────
function AppFrame({ active, title, subtitle, crumbs, children, right, showAI = true, compactSidebar = false }) {
  const [aiOpen, setAiOpen] = React.useState(true);
  return (
    <div className="shielded-root" style={{
      display: 'flex', height: '100%', background: 'var(--bg)',
    }}>
      <Sidebar active={active} compact={compactSidebar} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <TopBar title={title} subtitle={subtitle} crumbs={crumbs} right={right}/>
        {children}
      </div>
      {showAI && aiOpen && <AIAssistant onClose={() => setAiOpen(false)}/>}
    </div>
  );
}

// ─── Tweaks Panel (floating) ──────────────────────────────────────
function TweaksPanel({ tweaks, set }) {
  return (
    <div style={{
      position: 'fixed', bottom: 20, right: 20, zIndex: 500,
      width: 280, background: 'var(--bg-card)', border: '1px solid var(--line-2)',
      borderRadius: 12, padding: 16, boxShadow: '0 12px 40px rgba(0,0,0,0.15)',
      fontFamily: 'var(--f-sans)', color: 'var(--ink)', fontSize: 13,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
        <div className="serif" style={{ fontSize: 17 }}>Tweaks</div>
        <div className="eyebrow">Shielded</div>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <div>
          <div className="eyebrow" style={{ marginBottom: 6 }}>Theme</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {['light', 'dark'].map(t => (
              <button key={t} onClick={() => set({ theme: t })} className="btn btn-ghost btn-sm"
                style={{ flex: 1, justifyContent: 'center',
                  borderColor: tweaks.theme === t ? 'var(--navy)' : 'var(--line)',
                  background: tweaks.theme === t ? '#eef2fb' : 'transparent',
                  color: tweaks.theme === t ? 'var(--navy)' : 'var(--ink-2)' }}>
                {t === 'light' ? <Icons.Sun size={12}/> : <Icons.Moon size={12}/>} {t}
              </button>
            ))}
          </div>
        </div>

        <div>
          <div className="eyebrow" style={{ marginBottom: 6 }}>Density</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {['balanced', 'compact'].map(t => (
              <button key={t} onClick={() => set({ density: t })} className="btn btn-ghost btn-sm"
                style={{ flex: 1, justifyContent: 'center',
                  borderColor: tweaks.density === t ? 'var(--navy)' : 'var(--line)',
                  background: tweaks.density === t ? '#eef2fb' : 'transparent' }}>
                {t}
              </button>
            ))}
          </div>
        </div>

        <div>
          <div className="eyebrow" style={{ marginBottom: 6, display: 'flex', justifyContent: 'space-between' }}>
            <span>Primary hue</span><span className="mono" style={{ fontSize: 10 }}>{tweaks.primaryHue}°</span>
          </div>
          <input type="range" min="180" max="340" step="1" value={tweaks.primaryHue}
            onChange={e => set({ primaryHue: +e.target.value })}
            style={{ width: '100%', padding: 0, border: 'none',
              background: 'linear-gradient(90deg, oklch(0.5 0.12 180), oklch(0.5 0.12 220), oklch(0.5 0.12 260), oklch(0.5 0.12 300), oklch(0.5 0.12 340))',

        <div>

                  background: tweaks.dashboardHero === t ? '#eef2fb' : 'transparent' }}>
                {t === 'A' ? 'Chart + number' : 'Editorial'}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Artboard wrapper that isolates layout ────────────────────────

}

  React.useEffect(() => { applyTweaks(tweaks); }, [tweaks]);

  // Keyboard shortcuts: T = Tweaks panel, D = dark/light toggle
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target.matches('input,textarea,[contenteditable]')) return;
      if (e.key === 't' || e.key === 'T') setShowTweaks(s => !s);
      if (e.key === 'd' || e.key === 'D') {
        const next = tweaks.theme === 'dark' ? 'light' : 'dark';
        setTweaks(t => ({ ...t, theme: next }));
        applyTweaks({ ...tweaks, theme: next });
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [tweaks]);

    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
